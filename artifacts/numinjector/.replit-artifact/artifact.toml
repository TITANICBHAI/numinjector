kind = "mobile"
previewPath = "/"
title = "NumInjector"
version = "1.0.0"
id = "artifacts/numinjector"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21485

[services.development]
run = "pnpm --filter @workspace/numinjector run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/numinjector", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/numinjector", "run", "serve" ]

[services.env]
PORT = "21485"
BASE_PATH = "/"
