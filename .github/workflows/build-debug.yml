name: Build Debug APK

# Builds a debug APK on every push to main.
# No secrets required — debug builds are unsigned.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NPM_CONFIG_NODE_LINKER: hoisted
  EXPO_ROUTER_APP_ROOT: app

jobs:
  build:
    name: Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Toolchain ───────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── 3. Caches ──────────────────────────────────────────────────────────
      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 4. JS dependencies ─────────────────────────────────────────────────
      - name: Install JS dependencies
        run: pnpm install --no-frozen-lockfile

      # ── 4b. Read app version ────────────────────────────────────────────────
      - name: Read app version
        id: app-version
        working-directory: artifacts/numinjector
        run: |
          VERSION=$(node -e "const j=require('./app.json'); console.log(j.expo.version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Type:** Debug APK" >> $GITHUB_STEP_SUMMARY
          echo "- **Build number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

      # ── 5. Expo Prebuild ───────────────────────────────────────────────────
      - name: Expo Prebuild
        working-directory: artifacts/numinjector
        run: npx expo prebuild --platform android --clean --no-install

      # ── 6. Build (Gradle handles JS bundling automatically) ────────────────
      - name: Build debug APK
        working-directory: artifacts/numinjector/android
        env:
          EXPO_ROUTER_APP_ROOT: app
        run: |
          export EXPO_ROUTER_APP_ROOT=app
          ./gradlew assembleDebug --no-daemon
          echo "── Debug APK outputs ──"
          find app/build/outputs/apk/debug/ -name "*.apk" -exec ls -lh {} \;

      # ── 7. Upload ──────────────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: numinjector-debug-v${{ steps.app-version.outputs.version }}-run${{ github.run_number }}
          path: artifacts/numinjector/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
